name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    strategy:
      matrix:
        runtime:
          - win-x64
          - win-x86

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: |
        dotnet publish \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained true \
          -o publish/${{ matrix.runtime }}

    - name: Rename executable
      run: |
        ren publish\${{ matrix.runtime }}\five-letters.exe five-letters-${{ matrix.runtime }}.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          publish/${{ matrix.runtime }}/*.exe